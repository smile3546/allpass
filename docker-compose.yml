version: '3.8'

services:
  #Redis 快取服務
  redis:
    image: redis:7-alpine
    container_name: allpass_redis_container
    env_file:
      - ./.env
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_HOST_PORT:-6379}:${REDIS_PORT:-6379}"
    networks:
      - allpass-network
    restart: unless-stopped

  #Postgres(postgis) 服務
  postgis:
    image: postgis/postgis:16-3.4
    container_name: allpass_postgis_container
    env_file:
      - ./.env
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:${POSTGRES_PORT:-5432}"
    networks:
      - allpass-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-allpass_user} -d ${POSTGRES_DB:-allpass_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # #ETL:
  # etl:
  #   build:
  #     context: .
  #     dockerfile: etl/Dockerfile
  #   container_name: allpass_etl_container
  #   env_file:
  #     - ./.env
  #   volumes:
  #     # 熱更新 ETL 程式碼
  #     - ./etl:/app/etl
  #     # # 熱更新 common package
  #     # - ./common:/app/common
  #   networks:
  #     - allpass-network
  #   depends_on:
  #     redis:
  #       condition: service_started
  #     postgis:
  #       condition: service_healthy
  #   working_dir: /app

  #Backend 服務
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: allpass_backend_container
    env_file:
      - ./.env
    ports:
      - "${FLASK_HOST_PORT:-5000}:${FLASK_PORT:-5000}"
    networks:
      - allpass-network
    depends_on:
      postgis:
        condition: service_healthy
      redis:
        condition: service_started
      # etl:
      #   condition: service_completed_successfully   # 等ETL成功才啟動      
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:${FLASK_PORT:-5000}/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  #Frontend 服務
  frontend:
    build: ./frontend
    container_name: allpass_frontend_container
    env_file:
      - ./.env
    volumes:
      - ./services/mlflow/init-minio.sh:/scripts/init-minio.sh
    ports:
      - "${WEB_HOST_PORT:-80}:${WEB_PORT:-80}"
    networks:
      - allpass-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  #minio
  minio:
    image: minio/minio:RELEASE.2023-09-07T02-05-02Z # 建議指定明確版本
    container_name: allpass_minio_container
    ports:
      - "${MINIO_HOST_PORT:-9000}:${MINIO_PORT:-9000}" # API Port
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:${MINIO_CONSOLE_PORT:-9001}" # Web Console Port
    env_file:
      - ./.env # MinIO 的帳密會從 .env 讀取
    volumes:
      - minio_data:/data # 使用命名卷來持久化儲存 MinIO 的數據
      #- ./services/mlflow/init-minio.sh:/docker-entrypoint-init.d/init-minio.sh # 掛載初始化腳本
    networks:
      - allpass-network
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    healthcheck:
      # 使用 MinIO Client (mc) 來檢查服務是否就緒
      # mc ready local 是 mc 檢查名為 local 的預設主機 (http://127.0.0.1:9000) 是否就緒的標準指令
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s # 可以縮短間隔，以便更快檢測
      timeout: 5s
      retries: 5

  #minio-init
  minio-init:
    image: minio/mc
    container_name: allpass_minio_init
    env_file:
      - ./.env
    volumes:
      - ./services/mlflow/init-minio.sh:/scripts/init-minio.sh
    networks:
      - allpass-network
    entrypoint: /bin/sh
    command: -c "/scripts/init-minio.sh"
    depends_on:
      minio:
        condition: service_healthy

  #mlflow
  mlflow:
    build:
      context: ./services/mlflow
      dockerfile: Dockerfile
    #image: ghcr.io/mlflow/mlflow:v2.13.2 # 建議指定明確的版本
    container_name: allpass_mlflow_container
    env_file:
      - ./.env
    # volumes:
    #   - ./mlruns:/mlruns # 將實驗紀錄掛載到本機，避免容器重啟後遺失
    ports:
      - "${MLFLOW_HOST_PORT:-5001}:${MLFLOW_PORT:-5000}" # 將主機 5001 port 映射到容器 5000 port
    networks:
      - allpass-network
    environment:
      #- MLFLOW_SERVER_DEFAULT_ARTIFACT_ROOT=/mlruns # 告訴 MLflow 將模型等產物存在 /mlruns
      # 這三個環境變數是為了讓 MLflow Client 知道如何連線到 MinIO
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - MLFLOW_S3_ENDPOINT_URL=http://minio:${MINIO_PORT:-9000}
    depends_on:
      postgis:
        condition: service_healthy
      minio:
        # 新增對 minio 的依賴
        condition: service_healthy
    command: >
      mlflow server --host 0.0.0.0 --port ${MLFLOW_PORT:-5000} --backend-store-uri postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgis:${POSTGRES_PORT:-5432}/${MLFLOW_DB:-mlflow_db} --default-artifact-root s3://${MINIO_BUCKET_NAME}/
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${MLFLOW_PORT:-5000}/" ]
      interval: 10s
      timeout: 5s
      retries: 5
  # #Training:
  # training:
  #   build:
  #     context: .
  #     dockerfile: training/Dockerfile
  #   container_name: allpass_training_container
  #   env_file:
  #     - ./.env
  #   volumes:
  #     - ./training/hyperparams.yaml:/app/training/hyperparams.yaml
  #   networks:
  #     - allpass-network
  #   depends_on:
  #     postgis:
  #       condition: service_healthy
  #     # etl:
  #     #   condition: service_completed_successfully   # 等ETL成功才啟動
  #     minio:
  #       condition: service_healthy
  #     mlflow:
  #       condition: service_healthy
  #   runtime: nvidia # 啟用 NVIDIA runtime: 讓容器拿到 GPU
  #   environment:
  #     - NVIDIA_VISIBLE_DEVICES=all #允許 container 存取所有 GPU
  #   #新增 deploy 區塊(docker swarm)以請求 GPU 資源
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: "all"
  #             capabilities: [ gpu ]

  #Time_Prediction
  time_prediction:
    build:
      context: .
      dockerfile: aiservices/time_prediction/Dockerfile
    container_name: allpass_time_prediction_container
    env_file:
      - ./.env
    # volumes:
    #   - ./models:/app/models:ro #ro (read-only)
    networks:
      - allpass-network
    ports:
      - "${TIME_PREDICTION_HOST_PORT:-8000}:${TIME_PREDICTION_PORT:-8000}"
    # depends_on:
    #   training:
    #     condition: service_completed_successfully # 等training成功才啟動
    depends_on:
      minio:
        condition: service_healthy
      mlflow:
        condition: service_healthy

volumes:
  postgis_data:
    name: allpass_postgis_data
  redis_data:
    name: allpass_redis_data
  minio_data:
    name: allpass_minio_data

networks:
  allpass-network:
    driver: bridge
